<tr class="fee" id="fee_{{fee.id}}" data-country-id="{{fee.country.id}}">
  <td>
    {{fee.country}}
  </td>
  <td>
    <form hx-trigger="change"
	        hx-target="#fee_{{fee.id}}"
	        hx-swap="outerHTML"
	        hx-post="{% url 'app:center_budget_fee' fee.budget.center.id fee.id %}"
          data-form-id="skip">
      {% csrf_token %}
      {{fee.as_form.credit_fee}}
    </form>
  </td>
  <td style="border-left: 1px solid gray">
    ${{fee.country.credit_fee}}
  </td>
  <td>
    <span class="total-country-fee"></span>
  </td>
  <td>
    <form hx-post="{% url 'app:center_budget_del_fee' fee.budget.center.id fee.id %}"
          hx-target="#fee_{{fee.id}}"
          hx-swap="outerhtml"
          style="margin-top: 15%">
      {% csrf_token %}
      <button style="width: 100%">Delete</button>
    </form>
  </td>
</tr>
