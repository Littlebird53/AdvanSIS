{% load autosave %}
<tr {{id_fields}} class="fee" data-country-id="{{instance.country.id}}">
  <td>
    {{instance.country}}
  </td>
  <td>
    {{instance|form_field}}
  </td>
  <td style="border-left: 1px solid gray">
    ${{instance.country.credit_fee}}
  </td>
  <td>
    <span class="total-country-fee"></span>
  </td>
  <td>
    {{instance|delete_button}}
  </td>
</tr>
