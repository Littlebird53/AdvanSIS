{% extends 'app/base.html' %}

{% block title %}Course Search{% endblock %}

{% block content %}
<h2>Courses</h2>
{% for course in courses %}
<div>
  <h3>{{course}}</h3>
  <p><b>Center:</b> {{course.center.name}}</p>
  <details>
    <summary>Description</summary>
    <p>{{course.template.description|linebreaksbr}}</p>
  </details>
  <p><a href="{% url 'app:course' course.id %}">Details</a></p>
  <p><a href="{% url 'app:enroll' course.id %}">Enroll</a></p>
</div>
{% endfor %}
{% endblock %}
