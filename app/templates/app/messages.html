{% extends 'app/base.html' %}

{% block title %}Messages{% endblock %}

{% block content %}
<h1>All Messages</h1>
{% for popup in popups %}
<div class="popup-message">
  <p class="popup-sender">Message from {{popup.sender.given_name}} {{popup.sender.family_name}} on {{popup.sent}}:</p>
  <p class="popup-body">{{popup.text|linebreaksbr}}</p>
</div>
{% endfor %}
{% endblock %}
