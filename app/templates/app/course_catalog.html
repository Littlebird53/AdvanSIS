{% extends 'app/base.html' %}

{% block title %}Course Catalog{% endblock %}

{% block content %}
{% for course in courses %}
<div>
  <a class="fake-anchor" name="c{{course.id}}">null</a>
  <h3>{{course}}</h3>
  <details>
    <summary>Description</summary>
    <p>{{course.description|linebreaksbr}}</p>
    <h4>Learning Objectives</h4>
    {{course.learning_objectives_block}}
  </details>
</div>
{% endfor %}
{% endblock %}
