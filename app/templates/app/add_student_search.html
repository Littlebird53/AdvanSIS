{% extends 'app/base.html' %}

{% block title %}Add Student to {{course}}{% endblock %}

{% block content %}
<h2>Add Student</h2>

<form method="GET">
  {{form}}
  <button type="submit">Search</button>
</form>

<p><a href="{% url 'app:manage_course' course.id %}">Cancel</a></p>

<ul>
  {% for student in students %}
  <li>
    {{student}} <a href="{% url 'app:add_student_confirm' course.id student.id %}">Add</a>
  </li>
  {% endfor %}
</ul>
{% endblock %}
