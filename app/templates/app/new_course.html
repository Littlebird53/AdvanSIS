{% extends 'app/base.html' %}

{% block title %}Add Course{% endblock %}

{% block content %}
<h1>Add a Course</h1>
{% if message %}
<h2>{{message}}</h2>
{% endif %}
<form method="POST">
  {% csrf_token %}
  <table>
    {{form.as_table}}
  </table>
  <button type="submit">Submit</button>
</form>
{% endblock %}
