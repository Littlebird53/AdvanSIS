<form hx-get="{% url 'app:add_student_query' course.id %}" hx-target="#query">
  {{form}}
  <button type="submit">Search</button>
</form>

<ul>
  {% for student in students %}
  <li>
    {{student}} <button hx-get="{% url 'app:add_student_confirm' course.id student.id %}" hx-target="#list">Add</button>
  </li>
  {% endfor %}
</ul>
