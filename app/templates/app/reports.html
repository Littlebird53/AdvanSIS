{% extends 'app/base.html' %}

{% block title %}{{center}} Reports{% endblock %}

{% block content %}
<h1>Tally Sheet</h1>
<div id="tally-results"></div>
<form hx-get="{% url 'app:center_tally' center.id %}"
      hx-target="#tally-results" data-form-id="skip">
  <table>
    {{form.as_table}}
  </table>
  <button type="submit">View</button>
</form>
{% endblock %}
